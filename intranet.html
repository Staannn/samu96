  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import {
      getFirestore, collection, doc,
      getDocs, addDoc, setDoc, updateDoc, deleteDoc,
      query, orderBy
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDa27t7jEnvsGNOHUvr9SRw10gS90qX7Ow",
      authDomain: "sau96-urgences.firebaseapp.com",
      projectId: "sau96-urgences",
      storageBucket: "sau96-urgences.firebasestorage.app",
      messagingSenderId: "807568498412",
      appId: "1:807568498412:web:1a83fef33301ef1f604fc9"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    window._db = db;
    window._fs = { collection, doc, getDocs, addDoc, setDoc, updateDoc, deleteDoc, query, orderBy };
    window._pharmacieReady = false;
    window._vehiculesReady = false;
    window._membresReady = false;

    async function initMembres() {
      try {
        const { collection, getDocs, addDoc } = window._fs;
        const snapMembres = await getDocs(collection(db, 'intranet_membres'));
        const membres = [];
        snapMembres.forEach((d, index) => {
          const data = d.data() || {};
          membres.push({
            _id: d.id,
            ...data,
            id: Number(data.id || index + 1)
          });
        });

        // First run: seed Firestore from in-file defaults when collection is empty.
        if (!membres.length && Array.isArray(DATA?.membres) && DATA.membres.length) {
          const seeded = [];
          for (const m of DATA.membres) {
            const ref = await addDoc(collection(db, 'intranet_membres'), m);
            seeded.push({ ...m, _id: ref.id });
          }
          DATA.membres = seeded;
        } else if (membres.length) {
          DATA.membres = membres;
        }
      } catch (e) {
        console.error('Firebase membres init error:', e);
      } finally {
        window._membresReady = true;
        if (typeof renderPersonnel === 'function') renderPersonnel();
      }
    }

    async function initPharmacie() {
      try {
        const { collection, getDocs, query, orderBy } = window._fs;

        const snapStocks = await getDocs(collection(db, 'intranet_stocks'));
        DATA.pharmacie.stocks = [];
        snapStocks.forEach((d, index) => {
          const data = d.data() || {};
          DATA.pharmacie.stocks.push({
            _id: d.id,
            ...data,
            id: Number(data.id || index + 1)
          });
        });

        const snapCmd = await getDocs(query(collection(db, 'intranet_commandes'), orderBy('date', 'desc')));
        DATA.pharmacie.commandes = [];
        snapCmd.forEach(d => DATA.pharmacie.commandes.push({ _id: d.id, ...d.data() }));

        const snapMvt = await getDocs(query(collection(db, 'intranet_mouvements'), orderBy('date', 'desc')));
        DATA.pharmacie.mouvements = [];
        snapMvt.forEach(d => DATA.pharmacie.mouvements.push({ _id: d.id, ...d.data() }));

        window._pharmacieReady = true;
        if (typeof state !== 'undefined' && state.activeTab === 'pharmacie') renderPharmacie();
        else if (typeof renderPharmacie === 'function') renderPharmacie();
      } catch(e) {
        console.error('Firebase pharmacie init error:', e);
        window._pharmacieReady = true;
        if (typeof renderPharmacie === 'function') renderPharmacie();
      }
    }

    async function initVehicules() {
      try {
        const { collection, getDocs } = window._fs;
        const snapVehicules = await getDocs(collection(db, 'intranet_vehicules'));
        const vehicules = [];
        snapVehicules.forEach((d, index) => {
          const data = d.data() || {};
          vehicules.push({
            _id: d.id,
            ...data,
            id: Number(data.id || index + 1)
          });
        });
        if (vehicules.length) DATA.vehicules = vehicules;
      } catch (e) {
        console.error('Firebase vehicules init error:', e);
      } finally {
        window._vehiculesReady = true;
        if (typeof renderVehicules === 'function') renderVehicules();
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      initMembres();
      initPharmacie();
      initVehicules();
    });
  </script>

    // ==============================

    function escapeHtml(value = '') { return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    function initials(nom) { return nom.split(' ').filter(Boolean).slice(0, 2).map((p) => p[0].toUpperCase()).join(''); }
    function gradeColor(grade) { return ({ 'Chef de service': '#003087', 'Adjoint': '#6366f1', 'Médecin': '#0ea5e9', 'IDE SMUR': '#22c55e', 'Ambulancier': '#64748b' }[grade] || '#64748b'); }
    function statusLabel(statut) { return ({ actif: 'ACTIF', inactif: 'INACTIF', en_formation: 'EN FORMATION', disponible: 'DISPONIBLE', en_intervention: 'EN INTERVENTION', hs: 'HORS SERVICE', reserve_operationnelle: 'RÉSERVE OPÉRATIONNELLE' }[statut] || statut); }
    function statusBadge(statut) { return `<span class="status ${statut}"><span class="dot"></span>${statusLabel(statut)}</span>`; }
    function todayClock() { const now = new Date(); return `${now.toLocaleDateString('fr-FR', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' })} · ${now.toLocaleTimeString('fr-FR', { hour12: false })}`; }
    function formatDateFR(dateStr) { return dateStr ? new Date(dateStr).toLocaleDateString('fr-FR') : '—'; }
    function trunc(value = '', max = 60) { return value.length > max ? `${value.slice(0, max - 1)}…` : value; }
    function graviteClass(value = '') { return value === 'modéré' ? 'modere' : value; }
    function ctBadgeClass(dateStr) {
      const now = new Date();
      const target = new Date(dateStr);
      const diff = target - now;
      const oneMonth = 30 * 24 * 3600 * 1000;
      const sixMonths = 180 * 24 * 3600 * 1000;
      if (diff < oneMonth) return 'danger';
      if (diff < sixMonths) return 'warn';
      return 'ok';
    }
    function pharmaExpiryFlags(peremption) {
      const msIn3Months = 90 * 24 * 3600 * 1000;
      const isExpiringSoon = (new Date(peremption) - new Date()) < msIn3Months && new Date(peremption) > new Date();
      const isExpired = new Date(peremption) < new Date();
      return { isExpiringSoon, isExpired };
    }

tml(m.discord)}</div></div></div>${statusBadge(m.statut)}<div class="separator"></div><p class="sub-title">Formations validées</p><div class="formations-list">${forms || '<div class="meta">Aucune formation</div>'}</div><div class="separator"></div><p class="sub-title">Spécialités validées</p><div class="formations-list">${specialites || '<div class="meta">Aucune spécialité</div>'}</div><div class="card-actions"><button type="button" class="btn admin-only" data-action="edit-member" data-id="${m.id}">✏️ Modifier</button><button type="button" class="btn danger admin-only" data-action="delete-member" data-id="${m.id}">🗑️ Supprimer</button></div></article>`; }).join('')}</div>${members.length ? '' : '<div class="empty">Aucun membre ne correspond aux filtres.</div>'}</div>`;

      }).join('')}</div><div class="separator"></div><div class="table-wrap"><table><thead><tr><th>Nom</th><th>Type</th><th>Immatriculation</th><th>Affectation</th><th>Statut</th><th>Km actuel</th><th>Prochain CT</th><th>Incidents ouverts</th></tr></thead><tbody>${DATA.vehicules.map((v) => { const openCount = (v.incidents || []).filter((i) => !i.resolu).length; return `<tr><td>${escapeHtml(v.nom)}</td><td>${escapeHtml(v.type)}</td><td>${escapeHtml(v.immatriculation)}</td><td>${escapeHtml(v.affectation || '—')}</td><td><span style="font-weight:700;color:${v.statut === 'disponible' ? '#22c55e' : v.statut === 'en_intervention' ? '#0ea5e9' : v.statut === 'reserve_operationnelle' ? '#7c3aed' : '#ef4444'}">${statusLabel(v.statut)}</span></td><td>${Number(v.km_actuel || 0).toLocaleString('fr-FR')}</td><td><span class="badge-ct ${ctBadgeClass(v.date_prochain_ct)}">${formatDateFR(v.date_prochain_ct)}</span></td><td>${openCount > 0 ? `<span class="badge-ct danger">${openCount}</span>` : '0'}</td></tr>`; }).join('')}</tbody></table></div></div>`;

    async function fsAddStock(stockObj) {
      const { collection, addDoc } = window._fs;
      const ref = await addDoc(collection(window._db, 'intranet_stocks'), stockObj);
      stockObj._id = ref.id;
      DATA.pharmacie.stocks.push(stockObj);
      renderPharmacie();
    }
    async function fsUpdateStock(stockObj) {
      const { doc, updateDoc } = window._fs;
      const ref = doc(window._db, 'intranet_stocks', stockObj._id);
      const { _id, ...data } = stockObj;
      await updateDoc(ref, data);
      const idx = DATA.pharmacie.stocks.findIndex(s => s._id === stockObj._id);
      if (idx >= 0) DATA.pharmacie.stocks[idx] = stockObj;
      renderPharmacie();
    }
    async function fsDeleteStock(id) {
      const { doc, deleteDoc } = window._fs;
      await deleteDoc(doc(window._db, 'intranet_stocks', id));
      DATA.pharmacie.stocks = DATA.pharmacie.stocks.filter(s => s._id !== id);
      renderPharmacie();
    }

      persistData();

    async function fsUpdateMember(memberObj) {
      if (!memberObj?._id) {
        const { collection, addDoc } = window._fs;
        const ref = await addDoc(collection(window._db, 'intranet_membres'), memberObj);
        const saved = { ...memberObj, _id: ref.id };
        const idxNoId = DATA.membres.findIndex((m) => m.id === memberObj.id);
        if (idxNoId >= 0) DATA.membres[idxNoId] = saved;
        else DATA.membres.push(saved);
        persistData();
        renderPersonnel();
        return;
      }
      const { doc, updateDoc } = window._fs;
      const ref = doc(window._db, 'intranet_membres', memberObj._id);
      const { _id, ...data } = memberObj;
      await updateDoc(ref, data);
      const idx = DATA.membres.findIndex((m) => m._id === memberObj._id);
      if (idx >= 0) DATA.membres[idx] = memberObj;
      persistData();
      renderPersonnel();

    async function fsAddVehicle(vehicleObj) {
      const { collection, addDoc } = window._fs;
      const ref = await addDoc(collection(window._db, 'intranet_vehicules'), vehicleObj);
      vehicleObj._id = ref.id;
      DATA.vehicules.push(vehicleObj);
      persistData();
      renderVehicules();
    }

    async function fsUpdateVehicle(vehicleObj) {
      if (!vehicleObj?._id) {
        const { collection, addDoc } = window._fs;
        const ref = await addDoc(collection(window._db, 'intranet_vehicules'), vehicleObj);
        const savedVehicle = { ...vehicleObj, _id: ref.id };
        const idxNoId = DATA.vehicules.findIndex((v) => v.id === vehicleObj.id);
        if (idxNoId >= 0) DATA.vehicules[idxNoId] = savedVehicle;
        else DATA.vehicules.push(savedVehicle);
        persistData();
        renderVehicules();
        return;
      }
      const { doc, updateDoc } = window._fs;
      const ref = doc(window._db, 'intranet_vehicules', vehicleObj._id);
      const { _id, ...data } = vehicleObj;
      await updateDoc(ref, data);
      const idx = DATA.vehicules.findIndex((v) => v._id === vehicleObj._id);
      if (idx >= 0) DATA.vehicules[idx] = vehicleObj;
      persistData();
      renderVehicules();
    }

      if (type === 'pharma-movement') {
        title.textContent = 'Nouveau mouvement';
        body.innerHTML = `<div class="form-grid"><div class="field"><label for="mvProduit">Produit</label><select id="mvProduit" class="select">${DATA.pharmacie.stocks.map((s) => `<option value="${s.id}">${escapeHtml(s.nom)}</option>`).join('')}</select></div><div class="field"><label for="mvType">Type</label><select id="mvType" class="select"><option value="entree">entrée</option><option value="sortie">sortie</option></select></div><div class="field"><label for="mvQuantite">Quantité</label><input id="mvQuantite" type="number" class="input" value="1" min="1" /></div><div class="field"><label for="mvOperateur">Opérateur</label><input id="mvOperateur" class="input" value="${state.role === 'admin' ? 'Administrateur' : 'Gérant Pharma'}" readonly /></div><div class="field full"><label for="mvMotif">Motif</label><input id="mvMotif" class="input" value="" /></div></div><div class="modal-actions"><button type="button" class="btn ghost" data-action="close-modal">Annuler</button><button type="button" class="btn primary" data-action="save-pharma-movement">Enregistrer</button></div>`;
      }
      overlay.classList.add('open'); overlay.setAttribute('aria-hidden', 'false'); const firstInput = overlay.querySelector('input, select, button'); if (firstInput) firstInput.focus();
    }
    function closeModal() { const overlay = $('#modalOverlay'); overlay.classList.remove('open'); overlay.setAttribute('aria-hidden', 'true'); state.modal = { type: null, id: null }; }

    // ==============================
    // Actions CRUD
    // ==============================
    async function saveMemberFromModal() {
      const nom = $('#mNom').value.trim(), grade = $('#mGrade').value, role = $('#mRole').value.trim(), discord = $('#mDiscord').value.trim(), statut = $('#mStatut').value; if (!nom || !role || !discord) return;
      const formations = [...document.querySelectorAll('[data-row="formation"]')].map((row) => ({ nom: row.querySelector('[data-f="nom"]')?.value.trim() || '', date: row.querySelector('[data-f="date"]')?.value || '', 'validé': Boolean(row.querySelector('[data-f="valide"]')?.checked) })).filter((f) => f.nom);
      const specialites = [...document.querySelectorAll('[data-row="specialite"]')].map((row) => ({ nom: row.querySelector('[data-s="nom"]')?.value.trim() || '', date: row.querySelector('[data-s="date"]')?.value || '', 'validé': Boolean(row.querySelector('[data-s="valide"]')?.checked) })).filter((s) => s.nom);
      try {
        if (state.modal.id) {
          const existing = DATA.membres.find((m) => m.id === state.modal.id);
          if (!existing) return;
          await fsUpdateMember({ ...existing, nom, grade, role, discord, statut, formations, specialites });
        } else {
          const newMember = {
            id: Math.max(0, ...DATA.membres.map((m) => Number(m.id || 0))) + 1,
            nom, grade, role, discord, statut, photo: '', formations, specialites
          };
          await fsAddMember(newMember);
        }
        closeModal();
      } catch (e) {
        console.error('Erreur sauvegarde membre Firestore:', e);
        window.alert('Erreur de sauvegarde Firestore pour le membre. Vérifie la connexion et les règles de sécurité.');
      }
    }
    async function saveVehicleFromModal() {
      const nom = $('#vNom').value.trim(), type = $('#vType').value, immatriculation = $('#vImmat').value.trim(), statut = $('#vStatut').value; if (!nom || !immatriculation) return;
      const affectation = $('#vAffectation')?.value.trim() || '';
      const date_achat = $('#vDateAchat')?.value || '';
      const km_achat = Number($('#vKmAchat')?.value || 0);
      const km_actuel = Number($('#vKmActuel')?.value || 0);
      const date_derniere_vidange = $('#vDateDerniereVidange')?.value || '';
      const km_derniere_vidange = Number($('#vKmDerniereVidange')?.value || 0);
      const intervalle_vidange_km = Number($('#vIntervalleVidange')?.value || 0);
      const date_dernier_ct = $('#vDateDernierCt')?.value || '';
      const date_prochain_ct = $('#vDateProchainCt')?.value || '';
      const date_prochaine_revision = $('#vDateProchaineRevision')?.value || '';
      const km_prochaine_revision = Number($('#vKmProchaineRevision')?.value || 0);
      const commentaire = $('#vCommentaire')?.value.trim() || '';
      const equipements = [...document.querySelectorAll('[data-row="equip"] [data-equip]')].map((input) => input.value.trim()).filter(Boolean);
      const incidents = [...document.querySelectorAll('[data-row="incident"]')].map((row, idx) => ({ id: Number(row.dataset.incidentId || idx + 1), date: row.querySelector('[data-i="date"]')?.value || '', description: row.querySelector('[data-i="description"]')?.value.trim() || '', gravite: row.querySelector('[data-i="gravite"]')?.value || 'mineur', resolu: Boolean(row.querySelector('[data-i="resolu"]')?.checked), date_resolution: row.querySelector('[data-i="date_resolution"]')?.value || '' })).filter((i) => i.description || i.date);
      try {
        if (state.modal.id) {
          const existing = DATA.vehicules.find((v) => v.id === state.modal.id);
          if (!existing) return;
          await fsUpdateVehicle({ ...existing, nom, type, immatriculation, statut, affectation, km_actuel, km_achat, date_achat, date_derniere_vidange, km_derniere_vidange, intervalle_vidange_km, date_prochain_ct, date_dernier_ct, date_prochaine_revision, km_prochaine_revision, equipements, incidents, commentaire });
        } else {
          const newVehicle = {
            id: Math.max(0, ...DATA.vehicules.map((v) => Number(v.id || 0))) + 1,
            nom, type, immatriculation, statut, affectation, km_actuel, km_achat, date_achat,
            date_derniere_vidange, km_derniere_vidange, intervalle_vidange_km,
            date_prochain_ct, date_dernier_ct, date_prochaine_revision, km_prochaine_revision,
            equipements, incidents, commentaire
          };
          await fsAddVehicle(newVehicle);
        }
        closeModal();
      } catch (e) {
        console.error('Erreur sauvegarde véhicule Firestore:', e);
        window.alert('Erreur de sauvegarde Firestore pour le véhicule. Vérifie la connexion et les règles de sécurité.');
      }
    }
    async function savePharmaProductFromModal() {
      const editId = state.modal.id;
      const item = {
        nom: $('#pNom')?.value.trim() || '', famille: $('#pFamille')?.value.trim() || '', forme: $('#pForme')?.value.trim() || '', dci: $('#pDci')?.value.trim() || '',
        stock_actuel: Number($('#pStockActuel')?.value || 0), stock_min: Number($('#pStockMin')?.value || 0), stock_max: Number($('#pStockMax')?.value || 0),
        unite: $('#pUnite')?.value.trim() || '', peremption: $('#pPeremption')?.value || '', fournisseur: $('#pFournisseur')?.value.trim() || '',
        ref_fournisseur: $('#pRef')?.value.trim() || '', localisation: $('#pLoc')?.value.trim() || '', commentaire: $('#pComment')?.value.trim() || ''
      };
      if (!item.nom) return;
      if (editId) {
        const existing = DATA.pharmacie.stocks.find((s) => s._id === editId || String(s.id) === String(editId));
        if (existing) await fsUpdateStock({ ...existing, ...item });
      } else {
        await fsAddStock(item);
      }
      closeModal();
    }
    async function savePharmaOrderFromModal() {
      const produit_id = $('#oProduit')?.value || '';
      const product = DATA.pharmacie.stocks.find((s) => s._id === produit_id || String(s.id) === String(produit_id));
      if (!product) return;
      const cmdObj = {
        date: new Date().toISOString().slice(0, 10),
        produit_id: product._id || String(product.id),
        produit_nom: product.nom,
        quantite: Number($('#oQuantite')?.value || 1),
        statut: 'en_attente',
        fournisseur: $('#oFournisseur')?.value.trim() || product.fournisseur || '',
        demandeur: state.role === 'admin' ? 'Administrateur' : 'Gérant Pharma',
        commentaire: $('#oCommentaire')?.value.trim() || ''
      };
      pharmaState.subTab = 'commandes';
      closeModal();
      await fsAddCommande(cmdObj);
    }
    async function savePharmaMovementFromModal() {
      const produit_id = $('#mvProduit')?.value || '';
      const product = DATA.pharmacie.stocks.find((s) => s._id === produit_id || String(s.id) === String(produit_id));
      const type = $('#mvType')?.value || 'entree';
      const quantite = Number($('#mvQuantite')?.value || 1);
      if (!product || quantite <= 0) return;
      if (!window.confirm('Confirmer le mouvement et la mise à jour du stock ?')) return;
      const updatedStock = { ...product };
      if (type === 'sortie') updatedStock.stock_actuel = Math.max(0, updatedStock.stock_actuel - quantite);
      else updatedStock.stock_actuel += quantite;
      const mvtObj = {
        date: new Date().toISOString().slice(0, 16),
        produit_id: product._id || String(product.id),
        produit_nom: product.nom,
        type, quantite,
        motif: $('#mvMotif')?.value.trim() || '',
        operateur: $('#mvOperateur')?.value || (state.role === 'admin' ? 'Administrateur' : 'Gérant Pharma')
      };
      pharmaState.subTab = 'mouvements';
      closeModal();
      await fsUpdateStock(updatedStock);
      await fsAddMouvement(mvtObj);
    }

    // ==============================
    // Events globaux
    // ==============================
    document.addEventListener('input', (event) => {
      if (event.target.id === 'searchMember') { state.filters.search = event.target.value; renderPersonnel(); }
      if (event.target.id === 'pharmaSearch') { pharmaState.search = event.target.value; renderPharmacie(); }
    });
    document.addEventListener('change', (event) => {
      if (event.target.id === 'gradeFilter') { state.filters.grade = event.target.value; renderPersonnel(); }
      if (event.target.id === 'pharmaFamille') { pharmaState.famille = event.target.value; renderPharmacie(); }
      if (event.target.id === 'pharmaAlerte') { pharmaState.alerte = event.target.value; renderPharmacie(); }
      if (event.target.id === 'oProduit') {
        const product = DATA.pharmacie.stocks.find((s) => s._id === event.target.value || String(s.id) === String(event.target.value));
        if ($('#oFournisseur') && product) $('#oFournisseur').value = product.fournisseur || '';
      }
      if (event.target.matches('[data-i="resolu"]')) {
        const row = event.target.closest('[data-row="incident"]');
        const dateRes = row?.querySelector('[data-i="date_resolution"]');
        if (dateRes) dateRes.style.display = event.target.checked ? 'block' : 'none';
      }
    });
    document.addEventListener('click', (event) => {
      const target = event.target.closest('[data-action], [data-tab]'); if (!target) return;
      if (target.dataset.tab) { state.activeTab = target.dataset.tab; renderTabs(); return; }
      const action = target.dataset.action;
      const isAdmin = state.role === 'admin';
      const canPharma = state.role === 'admin' || state.role === 'pharma';
      if (action === 'open-auth') return openModal('auth');
      if (action === 'logout') { state.role = null; renderAuth(); renderTabs(); renderPersonnel(); renderVehicules(); renderPharmacie(); return; }
      if (action === 'validate-auth') {
        const username = $('#authUsername')?.value || '';
        const pass = $('#authPassword')?.value || '';
        if (username === 'admin' && pass === PASSWORDS.admin) state.role = 'admin';
        else if (username === 'pharma' && pass === PASSWORDS.pharma) state.role = 'pharma';
        else { $('#authError')?.classList.add('show'); return; }
        if (state.role === 'pharma') state.activeTab = 'pharmacie';
        renderAuth(); renderTabs(); renderPersonnel(); renderVehicules(); renderPharmacie(); closeModal();
        return;
      }
      if (action === 'close-modal') return closeModal();
      if (!isAdmin && ['add-member', 'edit-member', 'delete-member', 'add-vehicle', 'edit-vehicle', 'delete-vehicle', 'toggle-formation', 'toggle-specialite', 'save-member', 'save-vehicle'].includes(action)) return;
      if (action === 'add-member') return openModal('member');
      if (action === 'edit-member') return openModal('member', Number(target.dataset.id));
      if (action === 'delete-member') {
        const id = Number(target.dataset.id);
        if (!window.confirm('Supprimer ce membre ?')) return;
        const member = DATA.membres.find((m) => m.id === id);
        if (!member) return;
        (async () => {
          try {
            await fsDeleteMember(member);
          } catch (e) {
            console.error('Erreur suppression membre Firestore:', e);
            window.alert('Erreur de suppression Firestore pour le membre.');
          }
        })();
        return;
      }
      if (action === 'toggle-formation') {
        const id = Number(target.dataset.id), idx = Number(target.dataset.formIndex), member = DATA.membres.find((m) => m.id === id);
        if (!member || !member.formations[idx]) return;
        member.formations[idx]['validé'] = !member.formations[idx]['validé'];
        if (!member.formations[idx]['validé']) member.formations[idx].date = '';
        if (member.formations[idx]['validé'] && !member.formations[idx].date) member.formations[idx].date = new Date().toISOString().slice(0, 10);
        (async () => {
          try {
            await fsUpdateMember(member);
          } catch (e) {
            console.error('Erreur mise à jour formation membre Firestore:', e);
            window.alert('Erreur de mise à jour Firestore pour la formation du membre.');
          }
        })();
        return;
      }
      if (action === 'toggle-specialite') {
        const id = Number(target.dataset.id), idx = Number(target.dataset.specIndex), member = DATA.membres.find((m) => m.id === id);
        if (!member || !(member.specialites || [])[idx]) return;
        member.specialites[idx]['validé'] = !member.specialites[idx]['validé'];
        if (!member.specialites[idx]['validé']) member.specialites[idx].date = '';
        if (member.specialites[idx]['validé'] && !member.specialites[idx].date) member.specialites[idx].date = new Date().toISOString().slice(0, 10);
        (async () => {
          try {
            await fsUpdateMember(member);
          } catch (e) {
            console.error('Erreur mise à jour spécialité membre Firestore:', e);
            window.alert('Erreur de mise à jour Firestore pour la spécialité du membre.');
          }
        })();
        return;
      }
      if (action === 'save-member') return saveMemberFromModal();
      if (action === 'add-vehicle') return openModal('vehicle');
      if (action === 'edit-vehicle') return openModal('vehicle', Number(target.dataset.id));
      if (action === 'delete-vehicle') {
        const id = Number(target.dataset.id);
        if (!window.confirm('Supprimer ce véhicule ?')) return;
        const vehicle = DATA.vehicules.find((v) => v.id === id);
        if (!vehicle) return;
        (async () => {
          try {
            await fsDeleteVehicle(vehicle);
          } catch (e) {
            console.error('Erreur suppression véhicule Firestore:', e);
            window.alert('Erreur de suppression Firestore pour le véhicule.');
          }
        })();
        return;
      }
      if (action === 'save-vehicle') return saveVehicleFromModal();
      if (action === 'pharma-subtab') { pharmaState.subTab = target.dataset.subtab; renderPharmacie(); return; }
      if (action === 'add-pharma-product' && canPharma) return openModal('pharma-product');
      if (action === 'edit-pharma-product' && canPharma) return openModal('pharma-product', target.dataset.id);
      if (action === 'delete-pharma-product' && isAdmin) { const id = target.dataset.id; if (window.confirm('Supprimer ce produit ?')) { fsDeleteStock(id); } return; }
      if (action === 'save-pharma-product' && canPharma) return savePharmaProductFromModal();
      if (action === 'add-pharma-order' && canPharma) return openModal('pharma-order', target.dataset.productId || null);
      if (action === 'save-pharma-order' && canPharma) return savePharmaOrderFromModal();
      if (action === 'deliver-pharma-order' && canPharma) {
        const id = target.dataset.id;
        const order = DATA.pharmacie.commandes.find((c) => c._id === id || String(c.id) === id);
        if (!order || order.statut !== 'en_attente') return;
        (async () => {
          if (window.confirm('Ajouter la quantité livrée au stock actuel du produit ?')) {
            const product = DATA.pharmacie.stocks.find((s) => s._id === order.produit_id || String(s.id) === order.produit_id);
            if (product) {
              const updatedStock = { ...product, stock_actuel: product.stock_actuel + Number(order.quantite || 0) };
              await fsUpdateStock(updatedStock);
            }
          }
          const updatedOrder = { ...order, statut: 'livree' };
          await fsUpdateCommande(updatedOrder);
        })();
        return;
      }
      if (action === 'cancel-pharma-order' && isAdmin) { const id = target.dataset.id; const order = DATA.pharmacie.commandes.find((c) => c._id === id || String(c.id) === id); if (order) { const upd = { ...order, statut: 'annulee' }; fsUpdateCommande(upd); } return; }
      if (action === 'delete-pharma-order' && isAdmin) { const id = target.dataset.id; if (window.confirm('Supprimer cette commande ?')) { fsDeleteCommande(id); } return; }
      if (action === 'add-pharma-movement' && canPharma) return openModal('pharma-movement');
      if (action === 'save-pharma-movement' && canPharma) return savePharmaMovementFromModal();
      if (action === 'add-formation-row') { const wrap = $('#formationRows'); if (wrap) wrap.insertAdjacentHTML('beforeend', formationRowHtml({ nom: '', date: '', 'validé': false }, Date.now())); return; }
      if (action === 'add-specialite-row') { const wrap = $('#specialiteRows'); if (wrap) wrap.insertAdjacentHTML('beforeend', specialiteRowHtml({ nom: '', date: '', 'validé': false }, Date.now())); return; }
      if (action === 'add-equipment-row') { const wrap = $('#equipRows'); if (wrap) wrap.insertAdjacentHTML('beforeend', equipmentRowHtml('')); return; }
      if (action === 'add-incident-row') { const wrap = $('#incidentRows'); if (wrap) wrap.insertAdjacentHTML('beforeend', incidentRowHtml({ id: 0, date: '', description: '', gravite: 'mineur', resolu: false, date_resolution: '' }, Date.now())); return; }
      if (action === 'remove-row') { const row = target.closest('[data-row]'); if (row) row.remove(); }
    });
    $('#modalOverlay').addEventListener('click', (event) => { if (event.target.id === 'modalOverlay') closeModal(); });
    document.addEventListener('keydown', (event) => { if (event.key === 'Escape' && $('#modalOverlay').classList.contains('open')) closeModal(); });

    // ==============================
    // Initialisation
    // ==============================
    function boot() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (parsed.membres) DATA.membres = parsed.membres;
          if (parsed.vehicules) DATA.vehicules = parsed.vehicules;
        }
      } catch(e) {}
      updateClock(); setInterval(updateClock, 1000); renderAuth(); renderTabs(); renderPersonnel(); renderVehicules(); renderPharmacie();
    }
    boot();
  </script>
</body>
</html>
